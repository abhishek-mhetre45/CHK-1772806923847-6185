<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CraftConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; }

        .auth-top-bar {
            padding: 18px 40px;
            background: #fff;
            border-bottom: 2px solid #eee;
        }
        .auth-top-bar .logo-large {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .auth-section {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: #f5f7fa;
        }

        .auth-container { max-width: 500px; width: 100%; }

        .auth-card {
            background: #fff;
            border-radius: 20px;
            padding: 45px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header .brand {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            border-bottom: 2px solid;
            border-image: linear-gradient(135deg, #FF6B6B, #4ECDC4) 1;
            padding-bottom: 6px;
            margin-bottom: 18px;
        }

        .auth-header h2 {
            font-size: 28px;
            color: #2C3E50;
            margin-bottom: 8px;
        }

        .auth-header p { color: #7F8C8D; font-size: 15px; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2C3E50;
            font-size: 14px;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #7F8C8D;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #F9F9F9;
        }

        .form-group input:focus {
            border-color: #FF6B6B;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255,107,107,0.1);
            background: #fff;
        }

        .form-group input.error { border-color: #ff4444; }

        .error-message { color: #ff4444; font-size: 13px; margin-top: 5px; display: block; }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,107,0.35);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
            color: #7F8C8D;
            font-size: 15px;
        }

        .auth-footer a {
            color: #FF6B6B;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <!-- Top Bar - Logo Only (same as signup) -->
    <div class="auth-top-bar">
        <a href="login.html" class="logo-large">CraftConnect</a>
    </div>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="brand">CraftConnect</div>
                    <h2>Welcome Back</h2>
                    <p>Sign in to continue your artisan journey</p>
                </div>

                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="Enter your email">
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter your password">
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                        Sign In
                    </button>
                </form>

                <div class="auth-footer">
                    Don't have an account?
                    <a href="signup.html">Create Account</a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/appwrite/dist/iife/sdk.js"></script>
    <script src="../js/appwrite.js"></script>
    <script>
        (function () {
            try {
                var u = localStorage.getItem('cc_user');
                if (u && JSON.parse(u) && (JSON.parse(u).name || JSON.parse(u).email)) {
                    var user = JSON.parse(u);
                    window.location.replace(user.role === 'artisan' ? 'artisan-dashboard.html' : 'marketplace.html');
                }
            } catch (e) {}
        })();

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('email');
            var password = document.getElementById('password');
            var emailError = document.getElementById('emailError');
            var passwordError = document.getElementById('passwordError');

            email.classList.remove('error');
            password.classList.remove('error');
            emailError.textContent = '';
            passwordError.textContent = '';

            var isValid = true;
            if (!email.value.trim()) {
                email.classList.add('error');
                emailError.textContent = 'Email is required';
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                email.classList.add('error');
                emailError.textContent = 'Please enter a valid email';
                isValid = false;
            }
            if (!password.value) {
                password.classList.add('error');
                passwordError.textContent = 'Password is required';
                isValid = false;
            }

            if (!isValid) return;

            var emailVal = email.value.trim();
            var tryLocalLogin = function () {
                try {
                    var localUsers = JSON.parse(localStorage.getItem('cc_local_users') || '[]');
                    var found = localUsers.find(function (u) { return (u.email || '').toLowerCase() === emailVal.toLowerCase(); });
                    if (found) {
                        localStorage.setItem('cc_user', JSON.stringify({ id: found.id, name: found.name || '', email: found.email || '', role: found.role || 'customer' }));
                        window.location.href = (found.role === 'artisan') ? 'artisan-dashboard.html' : 'marketplace.html';
                        return true;
                    }
                } catch (e) {}
                return false;
            };

            if (window.AppwriteAPI && window.AppwriteAPI.listUsersByEmail) {
                window.AppwriteAPI.listUsersByEmail(emailVal)
                    .then(function (res) {
                        var docs = res.documents || [];
                        if (docs.length > 0) {
                            var user = docs[0];
                            localStorage.setItem('cc_user', JSON.stringify({ id: user.$id, name: user.name || '', email: user.email || '', role: user.role || 'customer' }));
                            window.location.href = (user.role === 'artisan') ? 'artisan-dashboard.html' : 'marketplace.html';
                        } else {
                            if (!tryLocalLogin()) passwordError.textContent = 'No account found with this email. Please sign up.';
                        }
                    })
                    .catch(function () {
                        if (!tryLocalLogin()) passwordError.textContent = 'Could not reach server. If you signed up offline, try again when connected.';
                    });
            } else {
                if (!tryLocalLogin()) passwordError.textContent = 'No account found with this email. Please sign up.';
            }
        });
    </script>
</body>
</html>
