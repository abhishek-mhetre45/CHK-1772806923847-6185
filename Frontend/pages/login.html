<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CraftConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Auth Pages Specific Styles */
        .auth-section {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #f9f9f9 100%);
        }

        .auth-container {
            max-width: 450px;
            width: 100%;
        }

        .auth-card {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header .logo-large {
            font-size: 32px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .auth-header h2 {
            font-size: 28px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .auth-header p {
            color: var(--text-light);
            font-size: 15px;
        }

        .auth-form .form-group {
            margin-bottom: 20px;
        }

        .auth-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
            font-size: 14px;
        }

        .auth-form .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .auth-form .input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--text-light);
            font-size: 16px;
        }

        .auth-form input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: var(--transition);
            background: var(--background-light);
        }

        .auth-form input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
        }

        .auth-form input.error {
            border-color: #ff4444;
        }

        .error-message {
            color: #ff4444;
            font-size: 13px;
            margin-top: 5px;
            display: block;
        }

        .password-requirements {
            background: var(--background-light);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 13px;
        }

        .password-requirements p {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .password-requirements ul {
            list-style: none;
            padding-left: 0;
        }

        .password-requirements li {
            color: var(--text-light);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .password-requirements li i {
            font-size: 12px;
            color: #ff4444;
        }

        .password-requirements li.valid i {
            color: #00C851;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .auth-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
        }

        .auth-footer p {
            color: var(--text-light);
            font-size: 15px;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: var(--transition);
        }

        .auth-footer a:hover {
            color: #ff5252;
            text-decoration: underline;
        }

        .forgot-password {
            text-align: right;
            margin-top: 8px;
        }

        .forgot-password a {
            color: var(--text-light);
            font-size: 13px;
            text-decoration: none;
        }

        .forgot-password a:hover {
            color: var(--primary-color);
        }

        .social-login {
            margin-top: 25px;
            text-align: center;
        }

        .social-login p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 15px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: #e0e0e0;
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icons a {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--background-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            font-size: 20px;
            transition: var(--transition);
            border: 1px solid #e0e0e0;
        }

        .social-icons a:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <!-- Top Bar (same as landing page) -->
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-left">
                <div class="logo-large">CraftConnect</div>
            </div>
            <div class="top-bar-center">
                <div class="search-box">
                    <input type="text" placeholder="Search...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                <div class="category-dropdown">
                    <select>
                        <option>All categories</option>
                        <option>Jewelry</option>
                        <option>Home & Living</option>
                        <option>Bath & Beauty</option>
                        <option>Art & Collectibles</option>
                    </select>
                </div>
            </div>
                        <div class="top-bar-right">
                <a href="signup.html" class="btn-signup">Sign Up</a>
                <a href="login.html" class="signin-link active">Login</a>
                <span class="hello-text">Hello, User</span>
                <div class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav class="main-nav">
        <div class="container">
            <ul class="nav-categories">
                <li><a href="../index.html">Home</a></li>
                <li><a href="marketplace.html">Marketplace</a></li>
                <li><a href="#">Jewelry</a></li>
                <li><a href="#">Home & Living</a></li>
                <li><a href="#">Bath & Beauty</a></li>
                <li><a href="#">Art & Collectibles</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo-large">CraftConnect</div>
                    <h2>Welcome Back!</h2>
                    <p>Sign in to continue your artisan journey</p>
                </div>

                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="Enter your email">
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter your password">
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                        Sign In
                    </button>
                </form>

                

                            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-icons-horizontal">
                    <a href="#" class="social-icon-circle google">
                        <i class="fab fa-google"></i>
                    </a>
                    <a href="#" class="social-icon-circle facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="#" class="social-icon-circle apple">
                        <i class="fab fa-apple"></i>
                    </a>
                </div>
            </div>

                <div class="auth-footer">
                    <p>Don't have an account? 
                        <a href="signup.html">Create Account</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <script src="../js/script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            
            // Reset errors
            email.classList.remove('error');
            password.classList.remove('error');
            emailError.textContent = '';
            passwordError.textContent = '';
            
            let isValid = true;
            
            // Email validation
            if (!email.value) {
                email.classList.add('error');
                emailError.textContent = 'Email is required';
                isValid = false;
            } else if (!isValidEmail(email.value)) {
                email.classList.add('error');
                emailError.textContent = 'Please enter a valid email';
                isValid = false;
            }
            
            // Password validation
            if (!password.value) {
                password.classList.add('error');
                passwordError.textContent = 'Password is required';
                isValid = false;
            }
            
            if (isValid) {
                // Simulate login
                alert('Login successful! Redirecting...');
                window.location.href = 'marketplace.html';
            }
        });

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
    </script>
</body>
</html>
