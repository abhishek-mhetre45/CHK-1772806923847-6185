<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CraftConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; }

        .top-bar {
            padding: 18px 40px;
            background: #fff;
            border-bottom: 2px solid #eee;
        }

        .logo-large {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .auth-section {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: #f5f7fa;
        }

        .auth-container { max-width: 500px; width: 100%; }

        .auth-card {
            background: #fff;
            border-radius: 20px;
            padding: 45px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header .brand {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            border-bottom: 2px solid;
            border-image: linear-gradient(135deg, #FF6B6B, #4ECDC4) 1;
            padding-bottom: 6px;
            margin-bottom: 18px;
        }

        .auth-header h2 {
            font-size: 28px;
            color: #2C3E50;
            margin-bottom: 8px;
        }

        .auth-header p { color: #7F8C8D; font-size: 15px; }

        .role-selector { display: flex; gap: 15px; margin-bottom: 22px; }

        .role-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-option:hover { border-color: #FF6B6B; }

        .role-option.selected {
            border-color: #FF6B6B;
            background: rgba(255,107,107,0.05);
        }

        .role-option i { font-size: 24px; color: #FF6B6B; display: block; margin-bottom: 6px; }
        .role-option span { font-weight: 600; color: #2C3E50; font-size: 14px; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2C3E50;
            font-size: 14px;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #7F8C8D;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #F9F9F9;
        }

        .form-group input:focus {
            border-color: #FF6B6B;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255,107,107,0.1);
            background: #fff;
        }

        .form-group input.error { border-color: #ff4444; }

        .error-message { color: #ff4444; font-size: 13px; margin-top: 5px; display: block; }

        .password-requirements {
            background: #F9F9F9;
            padding: 15px;
            border-radius: 10px;
            margin: -8px 0 18px;
            font-size: 13px;
        }

        .password-requirements p { font-weight: 600; margin-bottom: 8px; color: #2C3E50; }
        .password-requirements ul { list-style: none; padding: 0; }

        .password-requirements li {
            color: #7F8C8D;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .password-requirements li i { font-size: 12px; color: #ff4444; }
        .password-requirements li.valid i { color: #00C851; }

        .terms {
            margin: 18px 0;
            font-size: 13px;
            color: #7F8C8D;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terms input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .terms a { color: #FF6B6B; text-decoration: none; }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .auth-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,107,0.35);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
            color: #7F8C8D;
            font-size: 15px;
        }

        .auth-footer a {
            color: #FF6B6B;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Top Bar - Logo Only -->
    <div class="top-bar">
        <a href="../index.html" class="logo-large">CraftConnect</a>
    </div>

    <!-- Signup Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="brand">CraftConnect</div>
                    <h2>Join Our Community</h2>
                    <p>Create an account to start your artisan journey</p>
                </div>

                <form id="signupForm">
                    <div class="role-selector">
                        <div class="role-option selected" id="buyerRole" onclick="selectRole('buyer')">
                            <i class="fas fa-shopping-bag"></i>
                            <span>I'm a Buyer</span>
                        </div>
                        <div class="role-option" id="artisanRole" onclick="selectRole('artisan')">
                            <i class="fas fa-paint-brush"></i>
                            <span>I'm an Artisan</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="fullName" placeholder="Enter your full name">
                        </div>
                        <span class="error-message" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="Enter your email">
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Create a password">
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div class="password-requirements" id="passwordRequirements" style="display:none;">
                        <p>Password must contain:</p>
                        <ul>
                            <li id="length"><i class="fas fa-times"></i> At least 8 characters</li>
                            <li id="number"><i class="fas fa-times"></i> At least one number</li>
                            <li id="uppercase"><i class="fas fa-times"></i> At least one uppercase letter</li>
                            <li id="special"><i class="fas fa-times"></i> At least one special character</li>
                        </ul>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Confirm your password">
                        </div>
                        <span class="error-message" id="confirmError"></span>
                    </div>

                    <div class="form-group" id="locationGroup" style="display:none;">
                        <label for="location">Location</label>
                        <div class="input-wrapper">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" id="location" placeholder="e.g., Mumbai, India">
                        </div>
                    </div>
                    <div class="form-group" id="craftTypeGroup" style="display:none;">
                        <label for="craftType">Craft type</label>
                        <div class="input-wrapper">
                            <i class="fas fa-paint-brush"></i>
                            <input type="text" id="craftType" placeholder="e.g., Pottery, Jewelry">
                        </div>
                    </div>

                    <div class="terms">
                        <input type="checkbox" id="terms">
                        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fas fa-user-plus" style="margin-right:8px;"></i>
                        Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    Already have an account?
                    <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/appwrite/dist/iife/sdk.js"></script>
    <script src="../js/appwrite.js"></script>
    <script>
        (function () {
            try {
                var u = localStorage.getItem('cc_user');
                if (u && JSON.parse(u) && (JSON.parse(u).name || JSON.parse(u).email)) {
                    var user = JSON.parse(u);
                    window.location.replace(user.role === 'artisan' ? 'artisan-dashboard.html' : 'marketplace.html');
                }
            } catch (e) {}
        })();
        let selectedRole = 'buyer';

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('buyerRole').classList.remove('selected');
            document.getElementById('artisanRole').classList.remove('selected');
            document.getElementById(role + 'Role').classList.add('selected');
            const show = role === 'artisan';
            document.getElementById('locationGroup').style.display = show ? 'block' : 'none';
            document.getElementById('craftTypeGroup').style.display = show ? 'block' : 'none';
        }

        document.addEventListener('DOMContentLoaded', function () {
            const passwordInput = document.getElementById('password');
            const requirements = document.getElementById('passwordRequirements');

            passwordInput.addEventListener('input', function () {
                const pw = this.value;
                requirements.style.display = pw.length > 0 ? 'block' : 'none';

                const checks = {
                    length: pw.length >= 8,
                    number: /\d/.test(pw),
                    uppercase: /[A-Z]/.test(pw),
                    special: /[!@#$%^&*(),.?":{}|<>]/.test(pw)
                };

                Object.entries(checks).forEach(([id, valid]) => {
                    const el = document.getElementById(id);
                    const icon = el.querySelector('i');
                    el.classList.toggle('valid', valid);
                    icon.className = valid ? 'fas fa-check' : 'fas fa-times';
                    icon.style.color = valid ? '#00C851' : '#ff4444';
                });
            });

            document.getElementById('signupForm').addEventListener('submit', function (e) {
                e.preventDefault();

                const fullName = document.getElementById('fullName');
                const email = document.getElementById('email');
                const password = document.getElementById('password');
                const confirmPassword = document.getElementById('confirmPassword');
                const terms = document.getElementById('terms');

                document.getElementById('nameError').textContent = '';
                document.getElementById('emailError').textContent = '';
                document.getElementById('passwordError').textContent = '';
                document.getElementById('confirmError').textContent = '';
                [fullName, email, password, confirmPassword].forEach(function (el) { if (el) el.classList.remove('error'); });

                let isValid = true;

                [['fullName', 'nameError', !fullName.value.trim(), 'Full name is required'],
                 ['email', 'emailError', !email.value.trim(), 'Email is required'],
                 ['email', 'emailError', email.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value), 'Please enter a valid email'],
                 ['password', 'passwordError', !password.value, 'Password is required'],
                 ['password', 'passwordError', password.value && password.value.length < 8, 'Password must be at least 8 characters'],
                 ['confirmPassword', 'confirmError', confirmPassword.value !== password.value, 'Passwords do not match']
                ].forEach(function (item) {
                    var fieldId = item[0], errorId = item[1], condition = item[2], msg = item[3];
                    if (condition) {
                        document.getElementById(fieldId).classList.add('error');
                        document.getElementById(errorId).textContent = msg;
                        isValid = false;
                    }
                });

                if (!terms.checked) {
                    alert('Please agree to the Terms of Service and Privacy Policy');
                    isValid = false;
                }

                if (isValid) {
                    var role = selectedRole === 'artisan' ? 'artisan' : 'customer';
                    var userData = {
                        name: fullName.value.trim(),
                        email: email.value.trim(),
                        role: role,
                        location: (document.getElementById('location') && role === 'artisan') ? document.getElementById('location').value.trim() : '',
                        craft_type: (document.getElementById('craftType') && role === 'artisan') ? document.getElementById('craftType').value.trim() : ''
                    };
                    var submitBtn = document.querySelector('#signupForm button[type="submit"]');
                    if (window.AppwriteAPI && window.AppwriteAPI.createUser) {
                        if (submitBtn) { submitBtn.disabled = true; submitBtn.innerHTML = 'Creating account...'; }
                        window.AppwriteAPI.createUser(userData)
                            .then(function (doc) {
                                if (doc && doc.$id) {
                                    try {
                                        localStorage.setItem('cc_user', JSON.stringify({ id: doc.$id, name: userData.name, email: userData.email, role: userData.role }));
                                    } catch (err) {}
                                }
                                if (role === 'artisan') {
                                    alert('Welcome Artisan! Redirecting to your dashboard...');
                                    window.location.href = 'artisan-dashboard.html';
                                } else {
                                    alert('Account created successfully! Redirecting to marketplace...');
                                    window.location.href = 'marketplace.html';
                                }
                            })
                            .catch(function (err) {
                                var msg = (err && err.message) ? err.message : (err && err.toString) ? err.toString() : 'Server error';
                                var isFetchFailed = (msg.indexOf('fetch') !== -1 || msg.indexOf('Failed to fetch') !== -1);
                                if (isFetchFailed && window.AppwriteAPI && window.AppwriteAPI.createUserWithEndpoint) {
                                    window.AppwriteAPI.createUserWithEndpoint('https://cloud.appwrite.io/v1', userData)
                                        .then(function (doc) {
                                            if (doc && doc.$id) {
                                                try {
                                                    localStorage.setItem('cc_user', JSON.stringify({ id: doc.$id, name: userData.name, email: userData.email, role: role }));
                                                } catch (e) {}
                                            }
                                            if (role === 'artisan') { alert('Welcome Artisan! Redirecting...'); window.location.href = 'artisan-dashboard.html'; }
                                            else { alert('Account created! Redirecting...'); window.location.href = 'marketplace.html'; }
                                        })
                                        .catch(function (err2) {
                                            console.error('Sign up error:', err2);
                                            if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:8px;"></i> Create Account'; }
                                            try {
                                                var localId = 'local_' + Date.now();
                                                var userRecord = { id: localId, name: userData.name, email: userData.email, role: role };
                                                localStorage.setItem('cc_user', JSON.stringify(userRecord));
                                                var localUsers = JSON.parse(localStorage.getItem('cc_local_users') || '[]');
                                                localUsers.push({ id: localId, email: userData.email, name: userData.name, role: role });
                                                localStorage.setItem('cc_local_users', JSON.stringify(localUsers));
                                            } catch (e) {}
                                            alert('Could not reach server. You are signed in locally.\n\nTo fix: Open APPWRITE_SETUP.md in the project — add hostname 127.0.0.1 or localhost in Appwrite Console → Project → Overview → Platform.');
                                            if (role === 'artisan') window.location.href = 'artisan-dashboard.html';
                                            else window.location.href = 'marketplace.html';
                                        });
                                    return;
                                }
                                console.error('Sign up error:', err);
                                if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:8px;"></i> Create Account'; }
                                if (msg.indexOf('401') !== -1 || msg.indexOf('403') !== -1) {
                                    alert('Cannot save user: Check Appwrite permissions. In Console, set Users collection to allow "Create" and "Read" for role "any".');
                                } else if (isFetchFailed) {
                                    try {
                                        var localId = 'local_' + Date.now();
                                        var userRecord = { id: localId, name: userData.name, email: userData.email, role: role };
                                        localStorage.setItem('cc_user', JSON.stringify(userRecord));
                                        var localUsers = JSON.parse(localStorage.getItem('cc_local_users') || '[]');
                                        localUsers.push({ id: localId, email: userData.email, name: userData.name, role: role });
                                        localStorage.setItem('cc_local_users', JSON.stringify(localUsers));
                                    } catch (e) {}
                                    alert('Could not reach server. You are signed in locally.\n\nTo fix: Open APPWRITE_SETUP.md in the project — add hostname 127.0.0.1 or localhost in Appwrite Console → Project → Overview → Platform.');
                                    if (role === 'artisan') window.location.href = 'artisan-dashboard.html';
                                    else window.location.href = 'marketplace.html';
                                } else {
                                    alert('Could not save to server: ' + msg);
                                }
                            });
                    } else {
                        alert('Appwrite not loaded. Check console.');
                        if (role === 'artisan') window.location.href = 'artisan-dashboard.html';
                        else window.location.href = 'marketplace.html';
                    }
                }
            });
        });
    </script>
</body>
</html>
