<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisans' Marketplace</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-hands"></i>
                <span>Artisans' Marketplace</span>
            </div>
            <ul class="nav-menu">
                <li><a href="#home" class="active">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#features">Features</a></li>
            </ul>
        </div>
    </nav>
    
    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <h1>Welcome to <span class="highlight">Artisans' Marketplace</span></h1>
                <p class="subtitle">Where Tradition Meets Technology</p>
                <p class="description">Discover unique handmade treasures from local artisans. Support traditional craftsmanship and bring home stories crafted with passion.</p>
                <div class="hero-buttons">
                    <a href="#" class="btn-primary">Explore Marketplace</a>
                    <a href="#" class="btn-secondary">Learn More</a>
                </div>
            </div>
            <div class="hero-image">
                <img src="https://images.unsplash.com/photo-1605000797499-95a51c5269ae?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80" alt="Artisan crafting">
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>

</body>
</html>
