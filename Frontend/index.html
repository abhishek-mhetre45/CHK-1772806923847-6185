<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handmade With Heart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Top Bar with Search and Sign In -->
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-left">
                <div class="logo-large">CraftConnect</div>
        </div>
            <div class="top-bar-center">
                <div class="search-box">
                    <input type="text" placeholder="Search...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                <div class="category-dropdown">
                    <select>
                        <option>All categories</option>
                        <option>Jewelry</option>
                        <option>Home & Living</option>
                        <option>Bath & Beauty</option>
                        <option>Art & Collectibles</option>
                        <option>Fun & Games</option>
                        <option>Celebrations</option>
                    </select>
                </div>
            </div>
            <div class="top-bar-right">
                <a href="pages/login.html" class="signin-link">Sign In</a>
                <span class="hello-text">Hello.</span>
                <div class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav class="main-nav">
        <div class="container">
            <ul class="nav-categories">
                <li><a href="#" class="active">Jewelry</a></li>
                <li><a href="#">Home & Living</a></li>
                <li><a href="#">Bath & Beauty</a></li>
                <li><a href="#">Art & Collectibles</a></li>
                <li><a href="#">Fun & Games</a></li>
                <li><a href="#">Celebrations</a></li>
                <li><a href="#">More</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container">
            <div class="hero-content">
                <div class="hero-left">
                    <span class="shop-local">ShopLocal</span>
                    <h1 class="hero-title">
                        <span class="handmade">HANDMADE</span><br>
                        <span class="with-heart">WITH HEART</span>
                    </h1>
                    <p class="hero-subtitle">
                        Handmade in the USA · 100% Profits to Charity
                    </p>
                    <div class="hero-buttons">
                        <a href="#" class="btn-shop-now">SHOP NOW</a>
                        <a href="#" class="btn-learn-more">LEARN MORE</a>
                    </div>
                </div>
                <div class="hero-right">
    <div class="hero-image-grid-three">
        <!-- First image -->
        <div class="image-item">
            <img src="https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261" alt="Handmade Pottery">
            <span class="image-label">Pottery</span>
        </div>
        <!-- Second image -->
        <div class="image-item">
            <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3" alt="Handwoven Textile">
            <span class="image-label">Textiles</span>
        </div>
        <!-- Third image -->
        <div class="image-item">
            <img src="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908" alt="Handmade Jewelry">
            <span class="image-label">Jewelry</span>
        </div>
    </div>
</div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
